<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies Calendar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">

<div id="loginView" class="centered">
  <div class="auth-container">
    <div class="card login-card" id="loginForm">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h2>Movies Calendar</h2>
      <input type="email" id="loginEmail" placeholder="usuario@email.com" />
      <input type="password" id="loginPassword" placeholder="Contraseña" />
      <button id="loginBtn">Entrar</button>
      <p id="loginError"></p>
      <p class="auth-toggle">¿No tienes cuenta? <a href="#" onclick="toggleAuthForm(event)">Regístrate</a></p>
    </div>

    <div class="card login-card" id="signupForm" style="display: none;">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
          <line x1="12" y1="12" x2="12" y2="18"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
      </div>
      <h2>Crear Cuenta</h2>
      <input type="email" id="signupEmail" placeholder="usuario@email.com" />
      <input type="password" id="signupPassword" placeholder="Contraseña" />
      <input type="password" id="signupPasswordConfirm" placeholder="Repetir contraseña" />
      <button id="signupBtn">Registrarse</button>
      <p id="signupError"></p>
      <p class="auth-toggle">¿Ya tienes cuenta? <a href="#" onclick="toggleAuthForm(event)">Inicia sesión</a></p>
    </div>
  </div>
</div>

<div id="appView" style="display:none;">
  <header>
    <div class="header-left">
      <h1>Movies Calendar</h1>
    </div>
    <nav>
      <!-- Calendar button removed -->
      <!-- Rankings removed -->
      <button id="themeToggle" class="theme-btn" title="Cambiar tema">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <button id="logoutBtn" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4"></path>
          <polyline points="17 16 21 12 17 8"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </nav>
  </header>
  <main id="app"></main>
</div>

<div id="modalContainer"></div>

<script type="module" src="app.js"></script>
</body>
</html>
